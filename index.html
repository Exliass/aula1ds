<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Some Rap Songs / Experimental Pad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="crate">
        <header>
            <h1>[ abstract_loops ]</h1>
            <p class="description">Texturas sonoras inspiradas em Earl & MIKE. Use as teclas **Q, W, E, R**.</p>
        </header>
        
        <div class="pad-grid">
            <button class="pad" data-key="Q" data-type="sub" data-note="65.41">SUB BASS (Q)</button>
            <button class="pad" data-key="W" data-type="mellow" data-note="130.81">LO-FI CHORD (W)</button>
            <button class="pad" data-key="E" data-type="noise">VINYL CRACKLE (E)</button>
            <button class="pad" data-key="R" data-type="glitch" data-note="220.00">GLITCH OUT (R)</button>
        </div>

        <div class="status" id="status-text">sistema pronto. solta o som...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
